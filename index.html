<!DOCTYPE html>
<html lang="bn" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>القرآن الكريم — Ultimate Qur'an Reader</title>

  <!-- Google Fonts -->
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  
</head>
<body>

  <div id="progress-bar"></div>
  <div id="toast">বার্তা কপির বার্তা!</div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="#" class="nav-brand">القرآن الكريم</a>
      <div class="nav-controls">
        <button class="btn-icon" onclick="adjustFontSize(0.1)" title="Font Size increase">A+</button>
        <button class="btn-icon" onclick="adjustFontSize(-0.1)" title="Font Size decresse">A-</button>
        <button class="btn-icon" id="themeToggle">🌙 থিম</button>
      </div>
    </div>
  </nav>

  <div class="container">

    <!-- HERO BANNER -->
    <header class="hero-banner">
      <div class="hero-arabic">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
      <div class="hero-subtitle">সহজ, নির্ভুল ও আধুনিক ইন্টারফেসে বাংলা ও ইংরেজি অনুবাদসহ কুরআন পড়ুন</div>
    </header>

    <!-- CONTROL PANEL -->
    <div class="control-panel">
      <div class="control-group">
        <label>সূরা নির্বাচন করুন:</label>
        <select id="surahSelect" class="select-input" onchange="loadSurah(this.value)">
          <!-- Dynamic options -->
        </select>
      </div>
      <div class="control-group">
        <label>সূরা খুঁজুন (Search):</label>
        <input type="text" id="surahSearch" class="search-input" placeholder="সূরার নাম বা নাম্বার টাইপ করুন..." onkeyup="filterSurah()">
      </div>
      <div class="control-group" style="display:flex; align-items:center; gap:8px; padding-top:20px;">
        <input type="checkbox" id="autoPlayToggle" style="accent-color:var(--primary-accent); width:18px; height:18px; cursor:pointer;">
        <label for="autoPlayToggle" style="margin:0; cursor:pointer;">পরবর্তী আয়াত অটো-প্লে</label>
      </div>
    </div>

    <!-- MAIN DISPLAY VIEW -->
    <main id="quranView">
      <div class="loading-box">কুরআন মজিদের তথ্য লোড হচ্ছে... 📖</div>
    </main>

  </div>
  <script src="script.js"></script>  

  
</body>
</html>
